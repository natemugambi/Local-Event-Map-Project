<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — The Gathering</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">The <span>Gathering</span></span>
    </div>

    <div class="auth-card">
      <h2>Welcome back</h2>
      <p class="auth-subtitle">Log in to manage your events.</p>

      <p class="auth-redirect-msg" id="redirect-msg"></p>

      <form class="auth-form" id="login-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="Your username" />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="Your password" />

        <button type="submit" class="auth-btn" id="login-btn">Log In</button>
        <p class="auth-message" id="auth-message"></p>
      </form>
    </div>

    <p class="auth-switch">Don't have an account? <a href="signup.html">Sign up</a></p>
    <p class="auth-switch" style="margin-top:8px;"><a href="index.html">← Back to Map</a></p>
  </div>

  <script src="auth.js"></script>
</body>
</html>
