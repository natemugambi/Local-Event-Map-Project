<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Gathering</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVBAR -->
  <nav id="navbar">
    <div class="logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">The <span>Gathering</span></span>
    </div>
    <span class="tagline">Bay Area Events</span>
  </nav>

  <!-- MAIN LAYOUT -->
  <div id="app-body">

    <!-- LEFT: EVENT PANEL -->
    <aside id="event-panel">
      <div id="panel-header">
        <h2>Events Near You</h2>
        <div id="filter-bar">
          <button class="filter-btn active" data-filter="All">All</button>
          <button class="filter-btn" data-filter="Festivals & Entertainment">Festivals</button>
          <button class="filter-btn" data-filter="Community Gatherings">Community</button>
          <button class="filter-btn" data-filter="Conferences & Seminars">Seminars</button>
        </div>
      </div>
      <div id="event-list"></div>
    </aside>

    <!-- RIGHT: MAP -->
    <div id="map"></div>

  </div>

  <script src="script.js"></script>

  <!-- Loads Google Maps API — replace key below with your new restricted key -->
  <script async defer
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDl6zuRSeRDo8tQXC-iOZWBYBX-2BG_WyM&callback=initMap">
  </script>

</body>
</html>
