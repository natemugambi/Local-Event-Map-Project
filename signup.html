<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up — The Gathering</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="auth.css" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-logo">
      <span class="logo-icon">✦</span>
      <span class="logo-text">The <span>Gathering</span></span>
    </div>

    <div class="auth-card">
      <h2>Create an account</h2>
      <p class="auth-subtitle">Sign up to host and manage your events.</p>

      <form class="auth-form" id="signup-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required placeholder="e.g. oaklandpromoter" />

        <label for="email">Email</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com" />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" required placeholder="At least 8 characters" minlength="8" />

        <button type="submit" class="auth-btn" id="signup-btn">Create Account</button>
        <p class="auth-message" id="auth-message"></p>
      </form>
    </div>

    <p class="auth-switch">Already have an account? <a href="login.html">Log in</a></p>
    <p class="auth-switch" style="margin-top:8px;"><a href="index.html">← Back to Map</a></p>
  </div>

  <script src="auth.js"></script>
</body>
</html>
